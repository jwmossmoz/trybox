name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integration:
    name: Integration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: scripts/check-integration.sh
